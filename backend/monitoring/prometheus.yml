# Prometheus Configuration for Al-Mudeer Library Monitoring
# Save as: prometheus.yml
# Run with: prometheus --config.file=prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'almudeer-library'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules for alerts
rule_files:
  - "library_alerts.yml"

# Scrape configurations
scrape_configs:
  # Al-Mudeer Backend
  - job_name: 'almudeer-backend'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    
  # If running in Docker
  # - job_name: 'almudeer-docker'
  #   docker_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #       refresh_interval: 5s
  #       filters:
  #         - name: label
  #           values: ["almudeer"]
  #   relabel_configs:
  #     - source_labels: [__meta_docker_container_network_ip]
  #       target_label: __address__
  #       replacement: $1:8000

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    
  # Redis Exporter (if using Redis)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
    
  # PostgreSQL Exporter (if using PostgreSQL)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:9187']
