# CodeQL Analysis for Multi-language Project (Python, Dart, Kotlin)
# Backend: Python (FastAPI)
# Mobile App: Dart (Flutter) + Kotlin (Android native)

name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 1 * * 4'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: python
          build-mode: none
        - language: javascript-typescript
          build-mode: none
        - language: java-kotlin
          build-mode: manual
        # Note: Dart is analyzed via javascript-typescript since CodeQL doesn't have native Dart support
        # Kotlin files are analyzed with java-kotlin using manual build mode

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Setup Java for Kotlin analysis
    - name: Setup Java
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Setup Flutter for Dart analysis (optional, improves analysis quality)
    - name: Setup Flutter
      if: matrix.language == 'javascript-typescript'
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    # Build Kotlin/Android code (required for CodeQL to trace)
    - name: Generate Gradle Wrapper
      if: matrix.language == 'java-kotlin'
      working-directory: ./mobile-app/android
      run: gradle wrapper

    - name: Build Android (Kotlin)
      if: matrix.language == 'java-kotlin'
      working-directory: ./mobile-app/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
