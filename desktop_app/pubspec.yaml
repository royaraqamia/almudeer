name: almudeer_desktop
description: "Al-Mudeer Desktop - Comprehensive B2B Communication Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core UI
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  shimmer: 3.0.0
  figma_squircle: 0.6.3

  # State Management
  provider: ^6.1.5+1
  synchronized: ^3.4.0

  # HTTP & API
  http: ^1.6.0
  http_interceptor: 2.0.0
  crypto: ^3.0.6
  mime: ^2.0.0

  # Local Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  sqflite_common_ffi: ^2.3.0
  uuid: ^4.5.3

  # Utilities
  intl: 0.20.2
  hijri: 3.0.0
  url_launcher: ^6.3.2
  video_player: ^2.11.0
  chewie: 1.13.0
  flutter_pdfview: 1.4.4
  share_plus: ^12.0.1
  csv: 8.0.0

  # Audio & Media
  just_audio: 0.10.5
  file_picker: 10.3.10
  http_parser: 4.1.2
  audio_waveforms: 2.0.2

  # Features
  emoji_picker_flutter: 4.4.0
  image_picker: ^1.2.1
  path_provider: 2.1.5
  path: 1.9.1
  web_socket_channel: 3.0.3
  package_info_plus: ^9.0.0
  photo_view: 0.15.0
  flutter_slidable: ^4.0.3

  # File Download & Sharing
  dio: ^5.9.1
  open_filex: ^4.7.0

  # Connectivity & Device
  connectivity_plus: ^7.0.0
  device_info_plus: ^12.3.0
  logger: 2.7.0
  logging: 1.3.0

  # QR Code
  mobile_scanner: ^7.2.0
  qr_flutter: 4.1.0

  # Content
  hijri_picker: 3.0.0
  quran: 1.4.1
  webview_flutter: ^4.13.1

  # Math & Syntax
  math_expressions: 3.1.0
  flutter_linkify: 6.0.0
  linkify: 5.0.0
  flutter_highlight: 0.7.0
  highlight: 0.7.0

  # Excel
  excel:
    git: https://github.com/justkawal/excel.git
  
  equatable: 2.0.8
  app_links: 7.0.0
  characters: ^1.4.0

  # Desktop-specific packages
  window_manager: ^0.4.3
  tray_manager: ^0.5.2
  desktop_drop: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/json/
    - assets/audio/
    
  fonts:
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Bold.ttf
          weight: 700
    - family: Amiri Quran
      fonts:
        - asset: assets/fonts/Amiri_Quran/AmiriQuran-Regular.ttf
          weight: 400

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
  linux:
    generate: true
    image_path: "assets/images/logo.png"
